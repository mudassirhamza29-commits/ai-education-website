<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="stylesheet" href="calendar.css" />
</head>
<body>

  <!-- Header -->
  <header class="cal-header">
    <span class="cal-title">Calendar</span>
    <div class="cal-nav">
      <button id="btn-prev" aria-label="Previous month">&#8592;</button>
      <button id="btn-today">Today</button>
      <button id="btn-next" aria-label="Next month">&#8594;</button>
    </div>
    <span id="month-label" class="month-label"></span>
  </header>

  <!-- Calendar grid -->
  <main class="cal-main">
    <div class="cal-grid" id="cal-grid">
      <!-- Weekday headers -->
      <div class="cal-weekday">Sun</div>
      <div class="cal-weekday">Mon</div>
      <div class="cal-weekday">Tue</div>
      <div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div>
      <div class="cal-weekday">Fri</div>
      <div class="cal-weekday">Sat</div>
      <!-- Day cells injected by JS -->
    </div>
  </main>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
      <h2 id="modal-heading">Add Event</h2>

      <form id="event-form" novalidate>
        <input type="hidden" id="event-id" />

        <div class="form-group">
          <label for="event-title">Title <span class="required">*</span></label>
          <input type="text" id="event-title" placeholder="Event title" autocomplete="off" />
          <span class="field-error" id="error-title"></span>
        </div>

        <div class="form-group">
          <label for="event-date">Date <span class="required">*</span></label>
          <input type="date" id="event-date" />
          <span class="field-error" id="error-date"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="event-start">Start time</label>
            <input type="time" id="event-start" />
          </div>
          <div class="form-group">
            <label for="event-end">End time</label>
            <input type="time" id="event-end" />
            <span class="field-error" id="error-time"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="event-desc">Description</label>
          <textarea id="event-desc" rows="3" placeholder="Optional notes"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="btn-delete" class="btn-danger" style="display:none">Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="btn-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="btn-save" class="btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="calendar.js"></script>
</body>
</html>
